services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: DisPacz-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - DisPacz-sqlserver-data:/var/opt/mssql
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  DisPacz-sqlserver-data: